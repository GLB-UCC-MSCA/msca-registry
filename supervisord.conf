[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:registry]
command=/usr/bin/registry serve /etc/distribution/config.yml
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:browser]
command=bundle exec puma -C config/puma.rb
directory=/app
environment=RAILS_ENV="production",SECRET_KEY_BASE="%(ENV_SECRET_KEY_BASE)s",DOCKER_REGISTRY_URL="http://127.0.0.1:5000",ENABLE_DELETE_IMAGES="true",PORT="8080",ADDRESS="127.0.0.1"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
